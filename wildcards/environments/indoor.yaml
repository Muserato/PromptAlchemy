# Indoor environments

indoor:
  cozy:
    - warm firelit study with floor-to-ceiling bookshelves
    - sunlit kitchen with copper pots and herb bundles
    - candle-filled reading nook with velvet curtains
    - cottage interior with dried flowers and woven rugs

  grand:
    - marble-floored palace hall with golden chandeliers
